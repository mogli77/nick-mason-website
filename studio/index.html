<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio — Nick Mason Construction Co.</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/studio/studio.css">
</head>
<body>

    <!-- Login -->
    <div id="login">
        <form id="login-form">
            <h1>Nick Mason <span>Studio</span></h1>
            <p class="hint">The portfolio page, freely editable. Drag anything anywhere, then publish.</p>
            <label for="login-pass">Passphrase</label>
            <input id="login-pass" type="password" autocomplete="current-password" autofocus>
            <label>Who's editing?</label>
            <div class="editor-pick">
                <label><input type="radio" name="editor" value="Nick" checked> Nick</label>
                <label><input type="radio" name="editor" value="Kelly"> Kelly</label>
            </div>
            <button type="submit">Enter Studio</button>
            <p id="login-error" class="error"></p>
        </form>
    </div>

    <!-- App -->
    <div id="app" style="display:none">
        <header id="topbar">
            <div class="brand">NICK MASON <b>STUDIO</b></div>
            <div class="top-actions">
                <button id="undo" title="Undo (Cmd+Z)">↩</button>
                <button id="redo" title="Redo (Shift+Cmd+Z)">↪</button>
                <button id="viewport-toggle">Mobile view</button>
                <span class="zoom-seg">
                    <button data-zoom="0.1" title="Way out — the whole page">10%</button>
                    <button data-zoom="0.25">25%</button>
                    <button data-zoom="0.5">50%</button>
                    <button data-zoom="1" class="active">100%</button>
                </span>
                <span id="zoom-label" title="Pinch or ⌘+scroll on the page to zoom smoothly">100%</span>
                <a id="help-link" href="/studio/help.html" target="_blank" title="How to use Studio">?</a>
            </div>
            <div id="status-wrap">
                <span id="roundtrip"></span>
                <span id="status"></span>
                <span id="last-published"></span>
            </div>
            <div class="top-right">
                <span id="git-status" class="pro-only"></span>
                <span id="summary"></span>
                <button id="preview" title="Open the current draft in a new tab — nothing gets published">Preview</button>
                <button id="publish" class="primary" disabled>Publish</button>
                <button id="commit-push" class="pro-only" style="display:none" title="git commit + push (deploys the site)">Commit &amp; push</button>
                <span id="who" class="who"></span>
                <button id="logout" title="Sign out">×</button>
            </div>
        </header>

        <aside id="left">
            <h2>Page</h2>
            <div id="pagemap" title="Click to jump"></div>
        </aside>

        <main id="canvas-holder">
            <div id="zoom-box">
                <iframe id="canvas" title="Portfolio page canvas"></iframe>
            </div>
        </main>

        <aside id="right">
            <nav class="tabs">
                <button class="tab active" data-tab="images">Images</button>
                <button class="tab" data-tab="selected">Selected</button>
            </nav>
            <div class="tab-panel" id="images">
                <input id="tray-search" type="search" placeholder="Search…">
                <p class="hint" style="margin-bottom:10px">Drag a photo onto the page to add it.<span class="pro-only"> Drop image files here from Finder to add new ones. </span></p>
                <button id="add-video" class="pro-only" style="display:none; margin-bottom:10px">+ Add video by URL</button>
                <div id="tray"></div>
            </div>
            <div class="tab-panel" id="selected" style="display:none"></div>
        </aside>
    </div>

    <!-- Publish modal -->
    <div id="publish-modal" class="modal" style="display:none">
        <div class="modal-card">
            <h3 id="publish-title">Publish to the site</h3>
            <p id="publish-msg" class="hint"></p>
            <label for="publish-note">Note (optional — lands in the change history, Claude reads these)</label>
            <textarea id="publish-note" rows="3" placeholder="e.g. rearranged the middle, not sure about the dusk photos — polish welcome"></textarea>
            <div class="row" style="justify-content:flex-end; margin-top:16px">
                <button id="publish-cancel">Cancel</button>
                <button id="publish-go" class="primary">Publish</button>
            </div>
        </div>
    </div>

    <script type="module" src="/studio/js/studio.js"></script>
</body>
</html>
